<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART GENS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        a {
            display: block;
            transition: transform 0.1s ease;
        }
        a:active {
            transform: scale(0.92);
        }
        .title {
            position: absolute;
            top: 10vh;
            width: 100%;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            color: #fff;
        }
        .egg-img {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">ART &mdash;&mdash;&mdash;&mdash;&mdash; GENS</div>
    <a href="https://github.com/allibgbg/art-gens-backend/releases/latest/download/lambda-debug.apk">
        <img src="egg-cover.jpg" alt="ART GENS" class="egg-img">
    </a>
</body>
</html>
